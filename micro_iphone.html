function updatePowerOptions(source){

  let selectElement;
  let options;

  if(source === "voltage1"){
    const v1 = document.getElementById("voltage1").value;
    options = powerOptions1[v1];
    selectElement = document.getElementById("power");

  } else if(source === "voltage2"){
    const v2 = document.getElementById("voltage2").value;
    options = powerOptions2[v2];
    selectElement = document.getElementById("power2");

  } else if(source === "voltage"){
    const v = document.getElementById("voltage").value;
    options = powerOptions[v];
    selectElement = document.getElementById("power");
  }

  if(!options || !selectElement) return;

  selectElement.innerHTML = "";

  options.forEach(r=>{
    const o = document.createElement("option");
    o.value = r;
    o.textContent = r + " კვტ";
    selectElement.appendChild(o);
  });

  selectElement.selectedIndex = 0;
}

function parseRange(str){
  const nums=str.replace(/[^\d-]/g,"").split("-").map(n=>parseInt(n));
  return {min:nums[0],max:nums[1]||nums[0]};
}
function find(data, voltage, rangeStr){
  const {min, max} = parseRange(rangeStr);
  return data.find(d => 
    d.v === voltage && min >= d.range[0] && max <= d.range[1]
  );
}

function hideAll() {
  document.querySelectorAll(".field").forEach(f => {
    if (f.id !== "f-user" && f.id !== "f-network" && f.id !== "f-comp") {
      f.classList.add("hidden");
    }
  });
}

function show(id) {
  document.getElementById(id).classList.remove("hidden");
}

function hide(id) {
  document.getElementById(id).classList.add("hidden");
}

// When company changes
document.getElementById("comp").onchange = () => {
  document.getElementById("price").textContent="_";
  document.getElementById("deadline").textContent="_";
  let comp=document.getElementById("comp");

  
  // Reset networkType and all other dependent fields
  networkType.value = "0"; // reset network select
  userType.value = "0"; // reset user select

  hideAll();

  const fieldsToReset = ["location", "smartMeter", "voltage", "power", "voltage1", "voltage2","power2","region", "smartlessCount"];
  fieldsToReset.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;

    if (el.tagName === "SELECT") el.value = "0";
    else if (el.tagName === "INPUT" && el.type === "number") el.value = 0;
  });
};


// When userType changes

  document.getElementById("price").textContent="_";

// When networkType changes
document.getElementById("networkType").onchange = () => {
  document.getElementById("price").textContent="_";
  document.getElementById("deadline").textContent="_";
  hideAll();

  const user = userType.value;
  const net = networkType.value;

  // Reset dependent fields only
  const fieldsToReset = ["location", "smartMeter", "voltage", "power", "voltage1", "voltage2","power2","region", "smartlessCount"];
  fieldsToReset.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;

    if (el.tagName === "SELECT") el.value = "0";
    else if (el.tagName === "INPUT" && el.type === "number") el.value = 0;
  });

  if (user === "0" || net === "0") return;

  // ინდივიდუალური + შიდა ქსელი
  if (user === "retail" && net === "internal") {
    show("f-smart");
    return;
  }

  // სხვა ყველა შემთხვევა
  show("f-location");
};


const locationSelect = document.getElementById("location");

locationSelect.onchange = () => {
  document.getElementById("price").textContent="_";
  document.getElementById("deadline").textContent="_";
  const net = networkType.value;
  const loc = document.getElementById("location").value;
  const comp = document.getElementById("comp").value;
  const user = document.getElementById("userType").value;

  // Reset dependent fields only
  const fieldsToReset = ["voltage", "power", "voltage1", "voltage2","power2", "smartMeter", "region"];
  fieldsToReset.forEach(id => {
    const el = document.getElementById(id);

    if (el.tagName === "SELECT") el.value = "0";
    else if (el.tagName === "INPUT" && el.type === "number") el.value = 0;
  });
  
  if (comp === "epg"  && user === "group" && net === "internal" && loc === "different") {
    hide("f-smart");
    hide("f-voltage1");
    hide("f-voltage2");
    hide("f-voltage");
    hide("f-region");
    hide("f-power");
    updatePowerOptions();
    return; 
  }

  if (comp === "epg" && net === "distribution" && loc === "different") {
    hide("f-smart");
    hide("f-voltage1");
    hide("f-voltage2");
    hide("f-voltage");
    hide("f-region");
    hide("f-power");
    updatePowerOptions();
    return; 
  }

  if (comp === "epg" && net === "distribution" && loc === "same") {
    show("f-voltage1");
    show("f-power");
    show("f-region")
    hide("f-smart")
    updatePowerOptions();
    return; 
  }

  if (comp === "telasi" && net === "distribution" && loc === "same") {
    show("f-voltage");
    show("f-power");
    hide("f-smart")
    hide("f-voltage2");
    return; 
  }
  show("f-smart");
  updatePowerOptions();
  
};

document.getElementById("smartMeter").onchange = () => {
  document.getElementById("price").textContent="_";
  document.getElementById("deadline").textContent="_";
  let smartmeterId=document.getElementById("smartMeter");

  const user = userType.value;
  const net = networkType.value;
  const smart = smartmeterId.value;
  const loc = document.getElementById("location").value;
  const comp = document.getElementById("comp").value;

  // Reset dependent fields only
  const fieldsToReset = ["voltage", "voltage1", "voltage2", "power", "power2", "region"];
  fieldsToReset.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;

    if (el.tagName === "SELECT") el.value = "0";
    else if (el.tagName === "INPUT" && el.type === "number") el.value = 0;
  });
  

  // ინდივიდუალური + შიდა + გააჩნია → დასრულდა
  if (net === "internal" && smart === "yes") {
    document.getElementById("price").textContent = "0 ₾";
    document.getElementById("deadline").textContent = "10 სამუშაო დღე";
    hide("f-voltage1")
    hide("f-voltage2")
    hide("f-voltage")
    hide("f-power")
    hide("f-power2")
    return;
  }

  if (comp === "telasi" && user === "retail" && net === "distribution" && loc === "different" && smart === "no") {
    show("f-voltage");
    show("f-voltage2");
    show("f-power");
    show("f-power2");
    updatePowerOptions()
  }

  if (user === "group" && loc === "different" && smart === "no") {
    alert('მიკროს მიერთების დასრულების შემდეგ აითვლება ჭკვიანი მრიცხველის მოწყობის ვადა')
    show("f-smartless")
    show("f-voltage2");
    show("f-power2");
  }

  if (user === "group" && loc === "different" && smart === "yes") {
    hide("f-smartless")
  }

  if (comp === "telasi" && net === "distribution") {
    show("f-voltage");
    show("f-power");
  }

  if (comp === "epg" && net === "distribution") {
    show("f-region")
    show("f-voltage");
    show("f-power");
  }

  if (net === "internal") {
    show("f-voltage2");
    show("f-power2");
    return
  }
  // სხვა ყველა შემთხვევაში საჭიროა გამოთვლა
  if (comp === "epg" && net === "distribution") {
    updatePowerOptions();
    show("f-voltage1");
    show("f-power");
    return;
  }
  show("f-voltage");
  show("f-power");
  updatePowerOptions();
};
